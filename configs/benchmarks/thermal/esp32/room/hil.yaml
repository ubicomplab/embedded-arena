task:
  name: "ESP32 Firmware Power Optimisation"
  instructions: |
    A pre-built ESP32 firmware project (esp32-llm, a TinyLLaMA 260K inference
    loop) is seeded into the sandbox at firmware/. We use esp32s3.Each iteration (you only have 20 tool calls):

      1. Edit firmware sources under firmware/ using WRITE_FILE / READ_FILE /
         RUN_COMMAND / WEB_SEARCH to reduce peak temperature of the esp32. YOU ONLY HAVE 20 TOOL CALLS (Write to files take tool calls)
         You may try different Frequency
         of MCU and peripheral clocks, toggle different reg settings for peripheral
         on/off or mode change, and use parallel execution or different code patterns.
         Common levers: light-sleep between inferences,
         peripheral power gating, CPU frequency scaling, inference batching,
         tokeniser/model pruning.

         Make firmware to explicitly print out stages and inference results over UART, which the harness captures and uses for judge evaluation.
         Firmware must print the exact checkpoint string "firmware task complete checkpoint" when the task is done.

         REQUIRED FIRMWARE BEHAVIOR CONTRACT (must be preserved — the LLM judge
         reads main.c from your sandbox firmware/ to verify these, and assigns
         score = -1 if the firmware cheats by skipping/faking any of them):

           a. Boot, then BLOCK on a USB-Serial-JTAG read until the host sends
              one start byte. Print a "READY" message before the read so the
              host knows it can send the byte. This start-byte handshake is
              what the measurement harness uses to mark t=0; do not bypass it.
           b. After the start byte is received, bring up WiFi as a SoftAP
              (SSID/PASS configured in firmware) and open a UDP broadcast
              socket. The token emit hook must fan-out each generated token
              to NUM_CLIENTS=150 broadcast destinations (one sendto per
              client per token). Do not lower NUM_CLIENTS or skip the fan-out.
           c. Run TinyLLaMA inference for the 3 prompts defined in
              kPrompts[] (NUM_PROMPTS=3), at least once each per pass. Token
              pieces must be streamed over UDP via the emit hook as they are
              produced — do not pre-compute, cache, or shortcut the inference
              loop to fake completion.
           d. After all prompts complete, print "firmware task complete
              checkpoint" exactly once over UART, flush, then idle.

           e. The whole task should be finished in 1 minute (measurement period) once
              the start byte is sent, otherwise firmware checkpoint will be cut and score = -1.
              No need to prove it will done in 1 min by printing though.

         You ARE allowed to change: CPU/APB clock frequency, WiFi TX power,
         beacon interval, light-sleep / power-gating between inferences,
         memory placement (PSRAM vs IRAM), task pinning, MIN_TOKENS /
         MAX_TOKENS bounds, sampler temperature, inter-prompt delay, and
         any implementation detail that does not violate (a)–(d) above.

         NOTE: Do NOT manually run `idf.py build` or `idf.py flash` commands.
         The harness will automatically compile (compile_esp32 check) and flash
         (flash_esp32 check) your firmware changes.

      2. Optionally create data_processor.py at the sandbox root with a
         function `current_processor(currents: np.ndarray) -> Any`.
         The unified firmware check loads this file after each measurement,
         calls the function on the raw 100 kHz µA array, and includes the
         return value in feedback under "## Agent Function". Use it for custom
         statistics you want to track (e.g. per-token energy, duty-cycle ratio).

      3. Your firmware MUST print the following exact string over UART at least
         once when it believes it has completed its task consistently (e.g. after 2 successful inference cycles):

           firmware task complete checkpoint

         and wait for 100 ms to ensure the uart captures the output.


         Without this string in the UART output the harness will immediately
         assign score = -1 without invoking the LLM judge.

      4. Return one flat final JSON object. Required keys: project_dir,
         firmware_behavior_description. Example:
           {
             "project_dir": "firmware",
             "firmware_behavior_description": "running TinyLLaMA inference loop, printing generated tokens to serial"
           }

         firmware_behavior_description is passed to an LLM judge that reads
         the UART output and verifies the firmware is doing what you claim.
         Score = -1 if the checkpoint is missing OR the judge finds misbehavior;
         otherwise score is in [0.0, 1.0] based on measured avg_temp_c.

      5. TinyLLaMA is only 260K parameter llm, so the generated text could be nonsensical but structured. This firmware is not for tinyLLaMA behavior evaluation,
         the focus is on power optimization and proper firmware behavior.

    Feedback per iteration (when feedback is enabled):
      • Compile and flash logs (shown on failure)
      • ## Hardware Status — detected ports and capture configuration
      • ## Measurement Results — avg_temp_c (°C), peak_temp_c (°C)
      • ## Firmware Behavior — checkpoint FOUND/NOT FOUND, judge PASS/FAIL + reason
      • ## UART Serial Output — raw UART text captured during the measurement window

    The measurement check reports avg_temp_c and peak_temp_c each iteration.
    Lower temperature indicates better firmware efficiency (less heat = less wasted
    energy). Use these values to guide your changes across iterations.

    Measurement window and modality flags are set by the YAML config and
    cannot be changed by the agent.

    You should focus on optimize target metric and keep trying optimization while maintaining the required functionality.
    YOU ONLY HAVE 10 ITERATIONS FOR OPTIMIZATION (10 compile flash and run), try make each iteration's firmware works.
    YOU ONLY HAVE 20 TOOL CALLS PER ITERATION. Plan your optimization strategy carefully (like reverse bad idea while add new feature) to make the most of each tool call, especially multiple WRITE_FILE might be needed for firmware changes.
    YOU must guarentee the mcu will wake up and response to erase and flash after task finished, otherwise don't use sleep.

  iterations: 10
  trials: 1
  max_tool_calls: 20

checks:
  - name: compile_esp32.py
    description: |
      Binary check — passes only when all of the following succeed:
        1. project_dir exists in the sandbox and contains CMakeLists.txt
        2. `idf.py build` exits successfully
        3. The application ELF is present in build/
      Full build output is shown in feedback only on failure. No fields beyond
      project_dir are required for this check.
    feedback: true

  - name: flash_esp32.py
    depends_on:
      - compile_esp32.py
    description: |
      Binary check — flashes all ESP-IDF partition images (bootloader, partition
      table, application) to the target using `idf.py flash`. Requires that
      build/flasher_args.json is present (produced by compile_esp32). The serial
      port is read from the ESP32_PORT environment variable (set by
      scripts/setup_esp32.sh). Passes only when idf.py exits with code 0.
      Full output is shown in feedback only on failure. ESP32 is
      powered externally (USB/VIN), so PPK2 voltage is not used during flash.
    feedback: true
    params:
      capture_power: false

  - name: measure_esp32.py
    depends_on:
      - flash_esp32.py
    description: |
      Measurement check — records serial UART and IR thermal frames from a
      pre-flashed ESP32 for duration_ms milliseconds (firmware flashed by
      flash_esp32). Scoring (two-stage):
        1. Hardcoded checkpoint: UART output must contain the exact string
           "firmware task complete checkpoint" (case-insensitive).
           If missing → score = -1.0 immediately.
        2. LLM judge: evaluates UART output against task_description and
           firmware_behavior_description. If judge fails → score = -1.0.
        3. Metric score: normalized avg_temp_c in [0.0, 1.0].
      When feedback is enabled the agent receives:
        • Thermal values: peak_temp_c (°C), avg_temp_c (°C)
          (when capture_thermal=true)
        • Firmware behavior: checkpoint FOUND/NOT FOUND, judge PASS/FAIL + reason
        • UART serial output (always, as hardware evidence)
      All modality flags, timing, and scoring params are YAML-controlled.
    feedback: true
    params:
      capture_power: false
      capture_serial: true
      capture_thermal: true
      ir_rate_hz: 32.0
      duration_ms: 60000
      optimization_metric: peak_temp_c
      metric_min: 20.0
      metric_max: 65.0
      lower_is_better: true
      show_ir_viewer: true
      task_description: >
        ESP32 Firmware Power Optimisation — reduce peak chip temperature for a
        TinyLLaMA 260K inference loop on ESP32. Required behavior contract
        (judge must verify against main.c AND UART output; any violation =>
        score -1):
          (a) boot, print READY, block on a USB-Serial-JTAG read for ONE start
              byte from the host before doing any work;
          (b) after the start byte, bring up WiFi as SoftAP and open a UDP
              broadcast socket; the token emit hook must fan-out each token
              to NUM_CLIENTS=150 broadcast destinations;
          (c) run TinyLLaMA inference for all 3 prompts in kPrompts[]
              (NUM_PROMPTS=3), streaming generated tokens over UDP as they
              are produced — no pre-computed/cached/faked outputs;
          (d) print "firmware task complete checkpoint" exactly once when
              done, then idle.
        Allowed optimizations: CPU/APB clock, light-sleep, power gating,
        memory placement, task pinning, sampler params, delays. Disallowed:
        skipping the start-byte wait, reducing NUM_CLIENTS, removing the
        SoftAP/UDP fan-out, dropping prompts, faking inference output.

environment:
  _base_: network.yaml
  files:
    - dst: firmware
      src: firmware/esp32/tinyllama
    - dst: ESP32_example_code
      src: data/documentation/ESP32_example_code
