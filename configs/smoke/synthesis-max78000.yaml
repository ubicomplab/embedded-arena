task:
  name: "MAX78000 Synthesis Smoke Test"
  instructions: "A known-good MAX78000 ai8x checkpoint, matching YAML architecture file, and sample input are already in the sandbox. Return exactly this flat JSON object and no other text: {\"model_path\":\"models/ai85-cifar10-qat8-q.pth.tar\",\"yaml_path\":\"networks/cifar10-nas.yaml\",\"sample_input_path\":\"samples/sample_cifar-10.npy\",\"prefix\":\"smoke_cifar10\"}"
  iterations: 1
  trials: 1
  max_tool_calls: 1
checks:
  - name: synthesis_max78000.py
    feedback: true
environment:
  _base_: empty.yaml
  files:
    - src: .data/toolchains/max78000/ai8x-synthesis/trained/ai85-cifar10-qat8-q.pth.tar
      dst: models/ai85-cifar10-qat8-q.pth.tar
    - src: .data/toolchains/max78000/ai8x-synthesis/networks/cifar10-nas.yaml
      dst: networks/cifar10-nas.yaml
    - src: .data/toolchains/max78000/ai8x-synthesis/tests/sample_cifar-10.npy
      dst: samples/sample_cifar-10.npy
