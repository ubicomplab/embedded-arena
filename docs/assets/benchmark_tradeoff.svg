<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="680" viewBox="0 0 1100 680" role="img" aria-labelledby="title desc">
<title id="title">Embedded Arena model success versus token utilization</title>
<desc id="desc">Average HIL compression task success rate plotted against average token usage. The x-axis is reversed so lower token use appears to the right.</desc>
<rect width="100%" height="100%" rx="18" fill="#ffffff"/>
